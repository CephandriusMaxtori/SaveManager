name: Gradle Package

on:
  release:
    types: [created]
  workflow_dispatch: # Allows manual triggering via GitHub CLI or Web UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        # server-id and settings-path are required for 'gradle publish' to work with GitHub Packages
        server-id: github 
        settings-path: ${{ github.workspace }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: ./gradlew build

    - name: Publish to GitHub Packages
      # This runs the 'publish' task. Ensure your build.gradle has a publishing block.
      run: ./gradlew publish
      env:
        USERNAME: ${{ github.actor }}
        TOKEN: ${{ secrets.GITHUB_TOKEN }}
