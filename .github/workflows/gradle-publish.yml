jobs:
  build:
    runs-on: ubuntu-latest
    # This line tells GitHub to run all 'run' commands inside the subfolder
    defaults:
      run:
        working-directory: SaveManager 

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github 
        settings-path: ${{ github.workspace }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        # We also need to tell the Gradle action where the build file is
        build-root-directory: SaveManager

    - name: Build with Gradle
      run: ./gradlew build

    - name: Publish to GitHub Packages
      run: ./gradlew publish
      env:
        USERNAME: ${{ github.actor }}
        TOKEN: ${{ secrets.GITHUB_TOKEN }}
# Trigger Sync
